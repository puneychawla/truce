<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Truce — Chess Peace Puzzle</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;background:#f5f3ee;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px;font-family:Georgia,serif;color:#1a1a1a;user-select:none;-webkit-tap-highlight-color:transparent;}
  button{font-family:Georgia,serif;cursor:pointer;border:none;outline:none;transition:all 0.15s;}
  button:active{transform:scale(0.97);}
  .piece{font-family:"Segoe UI Symbol","Apple Symbols","Noto Serif",Georgia,serif;font-variant-emoji:text;-webkit-font-smoothing:antialiased;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const {createElement:h,useState,useEffect,useMemo}=React;
const SIZE=5;
const T="\uFE0E";
const SYMBOLS={K:"♚"+T,Q:"♛"+T,R:"♜"+T,B:"♝"+T,N:"♞"+T,P:"♟"+T};
const NAMES={K:"King",Q:"Queen",R:"Rook",B:"Bishop",N:"Knight",P:"Pawn"};
const ATTACK_DESC={K:"All 8 adjacent squares",Q:"Entire rows, columns & diagonals",R:"Entire rows & columns",B:"Entire diagonals",N:"L-shape jumps only",P:"2 forward-diagonal squares (↑)"};

function mkRng(seed){let s=seed|0;return()=>{s=(s+0x6D2B79F5)|0;let t=Math.imul(s^(s>>>15),1|s);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
function hashStr(str){let h=5381;for(let i=0;i<str.length;i++)h=(Math.imul(33,h)^str.charCodeAt(i))|0;return h;}

function getAttacks(type,r,c){
  const s=new Set(),add=(nr,nc)=>{if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE)s.add(nr*SIZE+nc);};
  if(type==="N")for(const[dr,dc]of[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]])add(r+dr,c+dc);
  else if(type==="K")for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(dr||dc)add(r+dr,c+dc);}
  else if(type==="P"){add(r-1,c-1);add(r-1,c+1);}
  else{if(type==="R"||type==="Q")for(let i=0;i<SIZE;i++){if(i!==c)add(r,i);if(i!==r)add(i,c);}if(type==="B"||type==="Q")for(let d=1;d<SIZE;d++)for(const[dr,dc]of[[1,1],[1,-1],[-1,1],[-1,-1]])add(r+dr*d,c+dc*d);}
  return s;
}
function findConflicts(pieces){
  const pairs=[];
  for(let i=0;i<pieces.length;i++)for(let j=i+1;j<pieces.length;j++){const{t:t1,r:r1,c:c1}=pieces[i],{t:t2,r:r2,c:c2}=pieces[j];if(getAttacks(t1,r1,c1).has(r2*SIZE+c2)||getAttacks(t2,r2,c2).has(r1*SIZE+c1))pairs.push([pieces[i],pieces[j]]);}
  return pairs;
}
function countSolutions(fixedPieces,trayTypes){
  const emptyPos=[];for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(!fixedPieces.some(p=>p.row===r&&p.col===c))emptyPos.push([r,c]);
  const fixed=fixedPieces.map(p=>({t:p.type,r:p.row,c:p.col}));const seen=new Set();let count=0;const MAX=50;
  function solve(idx,placed){if(count>=MAX)return;if(idx===trayTypes.length){const key=placed.map(p=>`${p.t}${p.r}${p.c}`).sort().join("|");if(!seen.has(key)){seen.add(key);count++;}return;}for(const[r,c]of emptyPos){if(trayTypes[idx]==="P"&&r===0)continue;if(placed.some(p=>p.r===r&&p.c===c))continue;const p={t:trayTypes[idx],r,c};if(!findConflicts([...fixed,...placed,p]).length)solve(idx+1,[...placed,p]);}}
  solve(0,[]);return count>=MAX?"50+":count;
}
function getDiff(cnt){if(typeof cnt==="string")return{label:"Easy",col:"#27ae60"};if(cnt<=4)return{label:"Hard",col:"#c0392b"};if(cnt<=15)return{label:"Medium",col:"#e67e22"};return{label:"Easy",col:"#27ae60"};}

const POOLS=[["P","N","N","B","B","R","K"],["P","N","N","N","B","B","R"],["P","N","N","B","B","K","R"],["P","Q","N","N","B","K","N"],["P","P","N","N","B","B","K"],["P","P","N","B","R","K","N"],["P","P","N","N","B","R","K"],["P","P","B","N","K","R","N"]];

function genPuzzle(rng){
  const pool=[...POOLS[Math.floor(rng()*POOLS.length)]];
  const sh=arr=>{for(let i=arr.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}};
  const pawnTypes=pool.filter(t=>t==="P"),otherTypes=pool.filter(t=>t!=="P");sh(otherTypes);
  const types=[...pawnTypes,...otherTypes];
  const squares=[];for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)squares.push([r,c]);sh(squares);
  const occ=new Set();
  function solve(idx,placed){if(idx===types.length)return placed;for(const[r,c]of squares){if(types[idx]==="P"&&r===0)continue;const k=r*SIZE+c;if(occ.has(k))continue;const p={t:types[idx],r,c};if(!findConflicts([...placed,p]).length){occ.add(k);const res=solve(idx+1,[...placed,p]);if(res)return res;occ.delete(k);}}return null;}
  const sol=solve(0,[]);if(!sol){rng();return genPuzzle(rng);}
  const pawns=sol.filter(p=>p.t==="P"),others=sol.filter(p=>p.t!=="P");sh(others);
  const fixed3=[pawns[0],others[0],others[1]];
  const tray4=[...pawns.slice(1),...others.slice(2)].map(p=>p.t);
  const fixed=fixed3.map(p=>({type:p.t,row:p.r,col:p.c}));
  return{fixed,tray:tray4,solutionCount:countSolutions(fixed,tray4)};
}

function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function mkBoard(puzz){const b=Array(SIZE).fill(null).map(()=>Array(SIZE).fill(null));for(const{type,row,col}of puzz.fixed)b[row][col]={type,fixed:true,tid:null};return b;}
function mkTray(puzz){return puzz.tray.map((type,id)=>({type,id,placed:false,at:null}));}

function App(){
  const[puzzleNum,setPuzzleNum]=useState(0);
  const[puzzle,setPuzzle]=useState(null);
  const[board,setBoard]=useState(null);
  const[tray,setTray]=useState([]);
  const[sel,setSel]=useState(null);
  const[status,setStatus]=useState("playing");
  const[badKeys,setBadKeys]=useState(new Set());
  const[errMsg,setErrMsg]=useState("");
  const[hov,setHov]=useState(null);
  const[showGuide,setShowGuide]=useState(false);

  function load(puzz){setPuzzle(puzz);setBoard(mkBoard(puzz));setTray(mkTray(puzz));setSel(null);setStatus("playing");setBadKeys(new Set());setErrMsg("");}
  useEffect(()=>{const key=puzzleNum===0?`truce-pawn-daily-${todayStr()}`:`truce-pawn-free-${todayStr()}-${puzzleNum}`;load(genPuzzle(mkRng(hashStr(key))));},[puzzleNum]);

  const attackedSet=useMemo(()=>{if(status!=="correct"||!board)return null;const pieces=[];for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(board[r][c])pieces.push({type:board[r][c].type,r,c});const s=new Set();pieces.forEach(p=>getAttacks(p.type,p.r,p.c).forEach(k=>s.add(k)));return s;},[status,board]);

  function clearErr(){setBadKeys(new Set());setErrMsg("");setStatus("playing");}
  function onBoard(r,c){
    if(status==="correct"||!board)return;
    const cell=board[r][c];if(cell&&cell.fixed)return;
    if(sel!==null){const sp=tray.find(p=>p.id===sel);if(sp&&sp.type==="P"&&r===0)return;}
    if(cell&&!cell.fixed){clearErr();const nb=board.map(row=>[...row]);nb[r][c]=null;setBoard(nb);setTray(t=>t.map(p=>p.id===cell.tid?{...p,placed:false,at:null}:p));setSel(cell.tid);return;}
    if(sel!==null){clearErr();const piece=tray.find(p=>p.id===sel);if(!piece)return;const nb=board.map(row=>[...row]);if(piece.placed&&piece.at)nb[piece.at[0]][piece.at[1]]=null;nb[r][c]={type:piece.type,fixed:false,tid:piece.id};setBoard(nb);setTray(t=>t.map(p=>p.id===sel?{...p,placed:true,at:[r,c]}:p));setSel(null);}
  }
  function onTray(id){if(status==="correct")return;clearErr();setSel(prev=>prev===id?null:id);}
  function submit(){
    if(!board||!tray)return;
    const unplaced=tray.filter(p=>!p.placed);
    if(unplaced.length){setErrMsg(`Place all ${unplaced.length} piece${unplaced.length>1?"s":""}first`);setStatus("wrong");return;}
    const pieces=[];for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(board[r][c])pieces.push({t:board[r][c].type,r,c});
    const bad=findConflicts(pieces);
    if(!bad.length){setStatus("correct");setBadKeys(new Set());setErrMsg("");}
    else{const bk=new Set();const msgs=bad.map(([a,b])=>{bk.add(a.r*SIZE+a.c);bk.add(b.r*SIZE+b.c);return `${NAMES[a.t]} ↔ ${NAMES[b.t]}`;});setBadKeys(bk);setErrMsg(msgs.join(" · "));setStatus("wrong");}
  }

  if(!board||!puzzle)return h("div",{style:{padding:"80px",textAlign:"center",color:"#aaa"}},"Generating…");

  const allPlaced=tray.every(p=>p.placed);
  const selPiece=sel!==null?tray.find(p=>p.id===sel):null;
  const CELL=56,boardPx=SIZE*CELL+4,ARROW_W=26;
  const diff=getDiff(puzzle.solutionCount);
  const solLabel=typeof puzzle.solutionCount==="number"&&puzzle.solutionCount===1?"1 valid arrangement":`${puzzle.solutionCount} valid arrangements`;

  // Build board cells
  const boardEl=h("div",{style:{border:"2px solid #c8b898",borderRadius:"8px",overflow:"hidden",boxShadow:"0 2px 14px rgba(0,0,0,0.11)"}},
    ...Array(SIZE).fill(null).map((_,r)=>
      h("div",{key:r,style:{display:"flex"}},
        ...Array(SIZE).fill(null).map((_,c)=>{
          const light=(r+c)%2===0,cell=board[r][c],k=r*SIZE+c;
          const isBad=badKeys.has(k),isHov=hov&&hov[0]===r&&hov[1]===c;
          const isPawnTop=selPiece&&selPiece.type==="P"&&r===0;
          const canDrop=!cell&&selPiece&&!isPawnTop;
          const isMoveSel=cell&&!cell.fixed&&cell.tid===sel;
          const isAttacked=attackedSet&&attackedSet.has(k)&&!cell;
          let bg=light?"#f0d9b5":"#b58863";
          if(isBad)bg="#e74c3c";
          else if(isPawnTop&&isHov&&!cell)bg=light?"#f5e4e4":"#c09080";
          else if(canDrop&&isHov)bg=light?"#ffe8b0":"#cc9944";
          return h("div",{key:c,onClick:()=>onBoard(r,c),onMouseEnter:()=>setHov([r,c]),onMouseLeave:()=>setHov(null),style:{width:CELL+"px",height:CELL+"px",display:"flex",alignItems:"center",justifyContent:"center",background:bg,position:"relative",cursor:isPawnTop&&!cell?"not-allowed":(canDrop||(cell&&!cell.fixed))?"pointer":"default",outline:isMoveSel?"3px solid #e67e22":"none",outlineOffset:"-3px"}},
            isAttacked&&h("div",{style:{width:"8px",height:"8px",borderRadius:"50%",background:light?"rgba(90,52,12,0.5)":"rgba(245,215,160,0.6)",flexShrink:0,position:"relative",zIndex:1}}),
            cell&&h("span",{className:"piece",style:{fontSize:"38px",lineHeight:1,color:"#111",position:"relative",zIndex:1,display:"block"}},SYMBOLS[cell.type]),
            (!cell&&canDrop&&isHov)&&h("span",{className:"piece",style:{fontSize:"38px",lineHeight:1,opacity:0.2,color:"#111",position:"absolute"}},SYMBOLS[selPiece.type]),
            (cell&&cell.fixed&&status!=="correct")&&h("div",{style:{position:"absolute",bottom:"4px",right:"5px",width:"5px",height:"5px",borderRadius:"50%",background:light?"#7a5030":"#f0d9b5",zIndex:2}})
          );
        })
      )
    )
  );

  // Build tray
  const trayEl=h("div",{style:{marginBottom:"12px",width:"100%",maxWidth:boardPx+"px"}},
    h("div",{style:{fontSize:"9px",letterSpacing:"3px",textAlign:"center",color:"#aaa",marginBottom:"8px",textTransform:"uppercase"}},"Pieces to place"),
    h("div",{style:{display:"flex",gap:"8px",justifyContent:"center"}},
      ...tray.map(piece=>{
        const isSel=sel===piece.id;
        return h("div",{key:piece.id,onClick:()=>onTray(piece.id),style:{width:"64px",height:"64px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",border:isSel?"2px solid #b58863":"1px solid #ddd",borderRadius:"10px",cursor:"pointer",background:isSel?"#fdf5e8":"#fff",opacity:piece.placed?0.28:1,transition:"all 0.15s",transform:isSel?"scale(1.06)":"scale(1)",boxShadow:isSel?"0 2px 10px rgba(181,136,99,0.22)":"0 1px 4px rgba(0,0,0,0.06)"}},
          h("span",{className:"piece",style:{fontSize:"28px",lineHeight:1,color:"#111"}},SYMBOLS[piece.type]),
          h("span",{style:{fontSize:"9px",marginTop:"4px",color:"#999"}},NAMES[piece.type])
        );
      })
    )
  );

  // Build guide
  const guideEl=h("div",{style:{maxWidth:boardPx+"px",width:"100%",background:"#fff",borderRadius:"10px",border:"1px solid #e8e4dc",overflow:"hidden"}},
    h("div",{onClick:()=>setShowGuide(g=>!g),style:{padding:"11px 18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}},
      h("span",{style:{fontSize:"12px",color:"#888",letterSpacing:"1px"}},"How pieces attack"),
      h("span",{style:{fontSize:"13px",color:"#bbb"}},showGuide?"▲":"▼")
    ),
    showGuide&&h("div",{style:{padding:"2px 18px 12px",borderTop:"1px solid #f0ece4"}},
      ...Object.entries(ATTACK_DESC).map(([t,desc])=>
        h("div",{key:t,style:{display:"flex",alignItems:"center",gap:"10px",padding:"5px 0"}},
          h("span",{className:"piece",style:{fontSize:"18px",width:"22px",textAlign:"center",color:"#111"}},SYMBOLS[t]),
          h("div",{style:{fontSize:"12px"}},
            h("span",{style:{fontWeight:"bold",color:"#1a1a1a"}},NAMES[t]),
            h("span",{style:{color:"#888"}}," — "+desc)
          )
        )
      ),
      h("div",{style:{marginTop:"8px",padding:"7px 10px",background:"#f9f7f3",borderRadius:"6px",fontSize:"11px",color:"#999",lineHeight:1.6}},
        "ℹ️ Sliding pieces (Q, R, B) attack through other pieces. On solve, dots mark attack zones."
      )
    )
  );

  return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",width:"100%"}},
    // Title
    h("div",{style:{textAlign:"center",marginBottom:"14px"}},
      h("div",{style:{fontSize:"36px",lineHeight:1,marginBottom:"5px"}},"♟"+T),
      h("div",{style:{fontSize:"24px",letterSpacing:"6px",color:"#1a1a1a",textTransform:"uppercase",fontWeight:"normal"}},"Truce"),
      h("div",{style:{fontSize:"9px",letterSpacing:"5px",marginTop:"4px",color:"#b58863",textTransform:"uppercase"}},"The Chess Peace Puzzle")
    ),
    // Difficulty
    h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}},
      puzzleNum>0&&h("span",{style:{fontSize:"11px",color:"#aaa",letterSpacing:"1px"}},"Free #"+puzzleNum),
      h("div",{style:{padding:"3px 12px",borderRadius:"10px",border:"1px solid "+diff.col,fontSize:"10px",fontWeight:"bold",color:diff.col,letterSpacing:"2px",textTransform:"uppercase"}},diff.label)
    ),
    // Instruction
    h("div",{style:{fontSize:"12px",color:"#888",textAlign:"center",maxWidth:boardPx+"px",marginBottom:"12px",lineHeight:1.7}},
      "Select a piece · click a square to place it",
      h("br"),
      h("span",{style:{color:"#b58863"}},"No piece may attack another · dot = fixed piece")
    ),
    // Board row (arrow + board + spacer)
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",marginBottom:"14px"}},
      h("div",{style:{width:ARROW_W+"px",flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",opacity:0.45,paddingBottom:"6px"}},
        h("span",{style:{fontSize:"13px",color:"#555",lineHeight:1.1,fontWeight:"bold"}},"↑"),
        h("span",{className:"piece",style:{fontSize:"20px",color:"#333",lineHeight:1}},"♟"+T)
      ),
      boardEl,
      h("div",{style:{width:ARROW_W+"px",flexShrink:0}})
    ),
    // Tray
    trayEl,
    // Feedback
    h("div",{style:{minHeight:"40px",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:"10px",maxWidth:boardPx+"px",width:"100%",textAlign:"center"}},
      status==="wrong"&&h("div",{style:{color:"#c0392b",fontSize:"13px",lineHeight:1.5}},errMsg.includes("Place")?"⚠️ "+errMsg:"❌ "+errMsg),
      status==="correct"&&h("div",null,
        h("div",{style:{fontSize:"15px",color:"#1a1a1a",marginBottom:"4px"}},"✅ Peace achieved!"),
        h("div",{style:{fontSize:"11px",color:"#aaa",lineHeight:1.5}},
          h("span",{style:{color:diff.col,fontWeight:"bold"}},solLabel),
          h("span",{style:{color:"#ccc"}}," · "),
          h("span",{style:{color:diff.col,textTransform:"uppercase",letterSpacing:"1px",fontSize:"10px"}},diff.label)
        )
      )
    ),
    // Buttons
    h("div",{style:{display:"flex",gap:"10px",justifyContent:"center",marginBottom:"20px",flexWrap:"wrap"}},
      status!=="correct"&&h("button",{onClick:submit,disabled:!allPlaced,style:{padding:"11px 30px",borderRadius:"8px",background:allPlaced?"#b58863":"#e0ddd6",color:allPlaced?"#fff":"#aaa",fontSize:"15px",fontWeight:"bold",boxShadow:allPlaced?"0 2px 10px rgba(181,136,99,0.3)":"none",cursor:allPlaced?"pointer":"not-allowed"}},"Submit"),
      status!=="correct"&&h("button",{onClick:()=>load(puzzle),style:{padding:"11px 18px",borderRadius:"8px",background:"transparent",color:"#b58863",border:"1px solid #b58863",fontSize:"14px"}},"↺ Reset"),
      status==="correct"&&h("button",{onClick:()=>setPuzzleNum(n=>n+1),style:{padding:"11px 28px",borderRadius:"8px",background:"#1a1a1a",color:"#fff",fontSize:"15px",fontWeight:"bold"}},"🎲 Play more")
    ),
    // Guide
    guideEl
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
